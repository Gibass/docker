; Common performance defaults shared by dev and prod.
; Environment-specific overrides should be loaded afterwards.

memory_limit = 512M
max_execution_time = 120

; Common OPcache baseline.
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 30000
opcache.save_comments = 1
opcache.fast_shutdown = 1
opcache.jit = 0

; Safe default for mixed usage. Override to 0 in prod-specific ini if desired.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

realpath_cache_size = 4096K
realpath_cache_ttl = 600
